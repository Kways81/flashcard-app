<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Cards</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div id="home-screen">
      <h1>My Revision Cards</h1>

      <div id="deck-list">
        <button class="deck-btn">
          <span>JavaScript</span>
          <span>12 cards</span>
        </button>

        <button class="deck-btn">
          <span>CSS</span>
          <span>6 cards</span>
        </button>

        <button class="deck-btn">
          <span>HTML</span>
          <span>8 cards</span>
        </button>
      </div>

      <button id="add-card-btn">+ Add New Card</button>
    </div>

    <div id="study-screen" hidden>
      <!-- Slide 2 goes here -->
    </div>

    <div id="add-screen" hidden>
      <!-- Slide 3 goes here -->
    </div>

    <script src="script.js"></script>
  </body>
</html>
