<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revision Cards</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>

    <div id="home-screen">
      <h1>My Revision Cards</h1>

      <div id="deck-list">
        <button class="deck-btn">
          <span>JavaScript</span>
          <span>12 cards</span>
        </button>

        <button class="deck-btn">
          <span>CSS</span>
          <span>6 cards</span>
        </button>

        <button class="deck-btn">
          <span>HTML</span>
          <span>8 cards</span>
        </button>
      </div>

      <button id="add-card-btn">+ Add New Card</button>
    </div>

    <div id="study-screen" hidden>
      <div id="study-top">
        <button id="back-btn">← Back</button>
        <span id="card-counter">Card 3 / 10</span>
      </div>

      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>

      <div id="card">
        <p id="card-label">Question</p>
        <p id="card-text">What is a variable?</p>
      </div>

      <button id="flip-btn">Flip to see answer</button>
    </div>

    <div id="add-screen" hidden>
      <div id="add-top">
        <button id="add-back-btn">← Back</button>
        <h2>Add a Card</h2>
      </div>

      <label>Deck</label>
      <select id="deck-select">
        <option>JavaScript</option>
        <option>CSS</option>
        <option>HTML</option>
      </select>

      <label>Question</label>
      <textarea id="question-input" placeholder="Type your question here..."></textarea>

      <label>Answer</label>
      <textarea id="answer-input" placeholder="Type the answer here..."></textarea>

      <button id="save-btn">Save Card</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
